name: CI (Lint, Build, Test)

# 1. Quando é que este workflow deve correr?
on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install dependencies
              run: npm install

            # ==========================================
            # O PASSO QUE FALTA:
            # ==========================================
            - name: Generate Prisma Client
              run: npx prisma generate

            - name: Build project
              run: npx tsc # Agora o tsc já vai encontrar o PrismaClient!

            - name: Run tests
              run: npm test
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  DIRECT_URL: ${{ secrets.DIRECT_URL }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }} # Não esqueças deste!
